name: CI

# Build + test on every pushed commit (to any branch; tag pushes are handled by
# the release workflow) and on pull requests, uploading the built binary as a
# workflow artifact for each platform. Also runnable on demand from the Actions
# tab via workflow_dispatch.
on:
  push:
    branches: ["**"]
  pull_request:
  workflow_dispatch:

# Cancel an in-progress run when the same ref is pushed again.
concurrency:
  group: ci-${{ github.ref }}
  cancel-in-progress: true

env:
  CARGO_TERM_COLOR: always

jobs:
  build:
    name: Build & test (${{ matrix.os }})
    runs-on: ${{ matrix.os }}
    strategy:
      fail-fast: false
      matrix:
        include:
          - os: windows-latest
            bin: rustspeck.exe
          - os: ubuntu-latest
            bin: rustspeck
          - os: macos-latest
            bin: rustspeck
    steps:
      - uses: actions/checkout@v7

      # gpui's Linux backend needs Wayland/X11 (xcb), xkbcommon, fontconfig
      # (font-kit) and Vulkan (the blade renderer). macOS/Windows need nothing
      # beyond the runner's bundled SDKs.
      - name: Install Linux GUI dependencies
        if: runner.os == 'Linux'
        run: |
          sudo apt-get update
          sudo apt-get install -y \
            pkg-config \
            libwayland-dev \
            libxkbcommon-dev libxkbcommon-x11-dev \
            libx11-dev libxcb1-dev libxcb-render0-dev libxcb-shape0-dev libxcb-xfixes0-dev \
            libfontconfig1-dev \
            libvulkan-dev

      - uses: dtolnay/rust-toolchain@stable
      - uses: Swatinem/rust-cache@v2

      - name: Build
        run: cargo build --release --locked

      - name: Test
        run: cargo test --release --locked

      - name: Upload binary
        uses: actions/upload-artifact@v7
        with:
          name: rustspeck-${{ matrix.os }}
          path: target/release/${{ matrix.bin }}
          if-no-files-found: error
